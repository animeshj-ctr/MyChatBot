<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Add Expense - FastAPI Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="login" style="display: block;">
    <form id="login-form">
      <input id="username" type="text" placeholder="Username" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <div id="expense-container" style="display: none;">
    <aside id="sidebar" class="collapsed">
      <button id="toggle-nav" aria-label="Toggle navigation">☰</button>
      <div class="nav-content">
        <div class="user-info">
          <h4 id="user-name">User</h4>
          <button id="logout-btn">Logout</button>
        </div>
        <nav class="main-nav">
          <a href="/static/index.html" class="nav-link">💬 Chat</a>
          <a href="/static/expense.html" class="nav-link active">💰 Add Expense</a>
        </nav>
      </div>
    </aside>

    <main>
      <header>
        <div>
          <h1>Add Expense</h1>
          <p>Record a new expense transaction</p>
        </div>
      </header>

      <section id="expense-panel">
        <form id="expense-form">
          <div class="form-group">
            <label for="expense-userid">User ID *</label>
            <input id="expense-userid" type="number" min="1" placeholder="Enter User ID" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="expense-amount">Amount (₹) *</label>
              <input id="expense-amount" type="number" step="0.01" min="0" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label for="expense-date">Date *</label>
              <input id="expense-date" type="date" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="expense-mode">Payment Mode *</label>
              <input id="expense-mode" type="text" placeholder="e.g., Cash, Card, Cheque" required />
            </div>
            <div class="form-group">
              <label>Transaction Type *</label>
              <div class="radio-group">
                <label class="radio-label">
                  <input type="radio" name="expense-type" value="debit" checked /> Debit (Expense)
                </label>
                <label class="radio-label">
                  <input type="radio" name="expense-type" value="credit" /> Credit (Income)
                </label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="expense-description">Description *</label>
            <textarea id="expense-description" placeholder="Describe the expense..." rows="4" required></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Add Expense</button>
            <button type="reset" class="btn-secondary">Clear</button>
          </div>

          <div id="expense-status" class="expense-status"></div>
        </form>
      </section>
    </main>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const loginDiv = document.getElementById('login');
    const expenseContainer = document.getElementById('expense-container');
    const expenseForm = document.getElementById('expense-form');
    const expenseStatus = document.getElementById('expense-status');
    const sidebar = document.getElementById('sidebar');
    const toggleNav = document.getElementById('toggle-nav');
    const logoutBtn = document.getElementById('logout-btn');
    const userNameEl = document.getElementById('user-name');

    let token = localStorage.getItem('authToken');
    let currentUser = localStorage.getItem('currentUser');

    // Check if already logged in
    if (token && currentUser) {
      loginDiv.style.display = 'none';
      expenseContainer.style.display = 'flex';
      userNameEl.textContent = currentUser;
    }

    toggleNav.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username, password })
      });
      if (res.ok) {
        const data = await res.json();
        token = data.access_token;
        currentUser = username;
        localStorage.setItem('authToken', token);
        localStorage.setItem('currentUser', currentUser);
        userNameEl.textContent = username;
        loginDiv.style.display = 'none';
        expenseContainer.style.display = 'flex';
      } else {
        alert('Login failed');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      if (token) {
        await fetch('/logout', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      }
      token = null;
      currentUser = null;
      localStorage.removeItem('authToken');
      localStorage.removeItem('currentUser');
      expenseContainer.style.display = 'none';
      loginDiv.style.display = 'block';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      expenseStatus.textContent = '';
    });

    expenseForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!token) {
        expenseStatus.textContent = 'Please login first.';
        expenseStatus.className = 'expense-status error';
        return;
      }

      const payload = {
        userid: Number(document.getElementById('expense-userid').value),
        mode_of_payment: document.getElementById('expense-mode').value,
        amount: Number(document.getElementById('expense-amount').value),
        credit_or_debit: document.querySelector('input[name="expense-type"]:checked').value,
        expense_date: document.getElementById('expense-date').value,
        description: document.getElementById('expense-description').value
      };

      try {
        const res = await fetch('/expenses/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          const data = await res.json();
          expenseStatus.textContent = `✓ Expense added successfully! (ID: ${data.expenseid})`;
          expenseStatus.className = 'expense-status success';
          expenseForm.reset();
          setTimeout(() => {
            expenseStatus.textContent = '';
          }, 5000);
        } else {
          const error = await res.json();
          expenseStatus.textContent = `✗ ${error.detail || 'Failed to add expense.'}`;
          expenseStatus.className = 'expense-status error';
        }
      } catch (err) {
        expenseStatus.textContent = `✗ Error: ${err.message}`;
        expenseStatus.className = 'expense-status error';
      }
    });
  </script>
</body>
</html>
