<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FastAPI Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h2>🤖 FastAPI Chatbot</h2>

    <div id="mode">
      <label><input type="radio" name="mode" value="rest" checked /> REST</label>
      <label><input type="radio" name="mode" value="ws" /> WebSocket</label>
    </div>

    <div id="chat-window"></div>

    <form id="chat-form">
      <input id="msg" type="text" placeholder="Type your message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const chatWindow = document.getElementById('chat-window');
    const form = document.getElementById('chat-form');
    const msgInput = document.getElementById('msg');
    const modeRadios = document.querySelectorAll('input[name="mode"]');

    let sessionId = crypto.randomUUID();
    let ws = null;

    function appendBubble(text, who = 'user') {
      const div = document.createElement('div');
      div.className = 'bubble ' + who;
      div.textContent = text;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function appendOrUpdateBotPartial(text) {
      let last = chatWindow.querySelector('.bubble.bot.partial');
      if (!last) {
        last = document.createElement('div');
        last.className = 'bubble bot partial';
        chatWindow.appendChild(last);
      }
      last.textContent = text;
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function finalizeBotPartial(text) {
      const last = chatWindow.querySelector('.bubble.bot.partial');
      if (last) {
        last.classList.remove('partial');
        last.textContent = text;
      } else {
        appendBubble(text, 'bot');
      }
    }

    function currentMode() {
      return Array.from(modeRadios).find(r => r.checked).value;
    }

    function ensureWS() {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.bot_partial) {
          appendOrUpdateBotPartial(data.bot_partial);
        }
        if (data.bot) {
          finalizeBotPartial(data.bot);
        }
      };
      ws.onclose = () => {
        console.log('WebSocket closed');
      };
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (!text) return;
      appendBubble(text, 'user');
      msgInput.value = '';

      if (currentMode() === 'rest') {
        // REST call:
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ session_id: sessionId, message: text })
        });
        const data = await res.json();
        appendBubble(data.bot, 'bot');
      } else {
        // WebSocket streaming:
        ensureWS();
        ws.send(JSON.stringify({ message: text }));
      }
    });
  </script>
</body>
</html>
